<app-header/>
<div>
    <div>
        <app-filter (filterChanged)="handleFilterApplied($event)"></app-filter>
    </div>
    <div id="sorteos">
        <div id="top-items">
            <h1>Sorteos Actuales</h1>
            <h2 *ngIf="isLoggedIn && !isExpert">Puntos actuales: {{ userPoints }}</h2>
        </div>
        <div id="items">
            <div id="item" *ngFor="let product of products">
                <a [routerLink]="['/raffle/product', product.sorteoID]">
                    <app-product-item [product]="product"></app-product-item>
                </a>
            </div>
        </div>
    </div>
</div>
<app-footer/>
