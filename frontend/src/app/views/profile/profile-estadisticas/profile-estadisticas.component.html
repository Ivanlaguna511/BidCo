<div class="settings-header">
  <h2>Tus Estadísticas</h2>
  <p>Resumen de tu actividad y rendimiento en la plataforma.</p>
</div>

<div class="stats-dashboard">
  <div class="stats-grid">
    <div class="stat-widget">
      <span class="stat-title">Pujas Participadas</span>
      <span class="stat-value">{{ participatedBids }}</span>
    </div>
    <div class="stat-widget win">
      <span class="stat-title">Pujas Ganadas</span>
      <span class="stat-value">{{ wonBids }}</span>
    </div>
    <div class="stat-widget">
      <span class="stat-title">Subastas Creadas</span>
      <span class="stat-value">{{ createdBids }}</span>
    </div>
    <div class="stat-widget">
      <span class="stat-title">Sorteos Participados</span>
      <span class="stat-value">{{ participatedDraws }}</span>
    </div>
    <div class="stat-widget win">
      <span class="stat-title">Sorteos Ganados</span>
      <span class="stat-value">{{ wonDraws }}</span>
    </div>
  </div>

  <div class="chart-card">
    <canvas id="barChart"></canvas>
  </div>
</div>
