<h2>Mis Datos</h2>



<div class="form-container">
  <form (ngSubmit)="saveChanges()">
    <!-- Campos editables -->
    <div class="form-group">
      <label for="nombreUsuario">Nombre de usuario</label>
      <input type="text" id="nombreUsuario" [(ngModel)]="user.nombreUsuario" name="nombreUsuario" required />
    </div>

    <div class="form-group">
      <label for="correoElectronico">Correo</label>
      <input type="email" id="correoElectronico" [(ngModel)]="user.correoElectronico" name="correoElectronico" required />
    </div>

    <div *ngIf="!isExpert" class="form-group">
      <label for="ciudad">Ciudad</label>
      <input type="text" id="ciudad" [(ngModel)]="user.ciudad" name="ciudad" required />
    </div>

    <div *ngIf="!isExpert" class="form-group">
      <label for="codigoPostal">Código Postal</label>
      <input type="text" id="codigoPostal" [(ngModel)]="user.codigoPostal" name="codigoPostal" required />
    </div>

    <div *ngIf="!isExpert" class="form-group">
      <label for="calle">Calle</label>
      <input type="text" id="calle" [(ngModel)]="user.calle" name="calle" required />
    </div>

    <div *ngIf="!isExpert" class="form-group">
      <label for="numeroPiso">Número</label>
      <input type="number" id="numeroPiso" [(ngModel)]="user.numeroPiso" name="numeroPiso" required />
    </div>

    <div *ngIf="!isExpert" class="form-group">
      <label for="letraPiso">Letra</label>
      <input type="text" id="letraPiso" [(ngModel)]="user.letraPiso" name="letraPiso" />
    </div>

    <!-- Campos ocultos para datos no editables pero requeridos -->
    <input *ngIf="!isExpert" type="hidden" [(ngModel)]="user.pais" name="pais" />
    <input *ngIf="!isExpert" type="hidden" [(ngModel)]="user.saldo" name="saldo" />
    <input *ngIf="!isExpert" type="hidden" [(ngModel)]="user.puntos" name="puntos" />

    <button *ngIf="!isExpert" type="submit" class="btn-save">Guardar Cambios</button>

    <div *ngIf="updateMessage" class="update-message">{{ updateMessage }}</div>
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  </form>

  <!-- Sección de cambio de contraseña -->
  <h3 *ngIf="!isExpert">Cambiar Contraseña</h3>
  <form *ngIf="!isExpert" (ngSubmit)="updatePassword()">
    <div class="form-group">
      <label for="currentPassword">Contraseña actual</label>
      <input type="password" id="currentPassword" [(ngModel)]="currentPassword" name="currentPassword" required />
    </div>

    <div class="form-group">
      <label for="newPassword">Nueva contraseña</label>
      <input type="password" id="newPassword" [(ngModel)]="newPassword" name="newPassword" required />
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmar contraseña</label>
      <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" required />
    </div>

    <button type="submit" class="btn-save">Cambiar Contraseña</button>

    <div *ngIf="updatePasswdMessage" class="update-message">{{ updatePasswdMessage }}</div>
    <div *ngIf="errorPasswdMessage" class="error-message">{{ errorPasswdMessage }}</div>
  </form>
  
  <!-- Recarga de saldo -->
  <h3 *ngIf="!isExpert">Recargar Saldo</h3>
  <div *ngIf="!isExpert" class="saldo-section">
    <div class="saldo-actual">
      <span>Saldo actual:</span>
      <span class="saldo-cantidad">{{ user.saldo | currency:'EUR':'symbol' }}</span>
    </div>
    <form (ngSubmit)="recargarSaldo()">
      <div class="form-group">
        <label for="cantidadRecarga">Cantidad a recargar</label>
        <input type="number" id="cantidadRecarga" [(ngModel)]="cantidadRecarga" name="cantidadRecarga" min="1" required />
      </div>
      <button type="submit" class="btn-recharge">Recargar</button>
    </form>
    <div *ngIf="recargaMessage" class="recarga-message">{{ recargaMessage }}</div>
  </div>
</div>
