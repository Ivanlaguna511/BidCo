<app-header></app-header>

<div class="auth-page-background">
  <main class="auth-container">
    
    <div class="auth-card">
      <header class="auth-header">
        <h1 class="brand-title">BidCo</h1>
        <h2>Iniciar Sesión</h2>
        <p>Bienvenido de nuevo. Introduce tus datos para continuar.</p>
      </header>

      @if (loginError) {
        <div class="alert-error">
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor"><path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
          <span>{{ loginError }}</span>
        </div>
      }

      <form class="auth-form" (ngSubmit)="login()" #loginForm="ngForm">
        
        <div class="input-group">
          <label for="email">Correo o Nombre de usuario</label>
          <input 
            type="text" 
            id="email" 
            name="email" 
            placeholder="Ej: usuario@correo.com"
            required 
            [(ngModel)]="email" 
          />
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••"
            required 
            [(ngModel)]="password" 
          />
        </div>

        <div class="form-options">
          <label class="checkbox-group">
            <input type="checkbox" id="remember" name="remember" [(ngModel)]="remember" />
            <span class="custom-checkbox"></span>
            <span class="checkbox-label">Recordarme</span>
          </label>
          
          <a class="forgot-link" routerLink="/forgot-password">¿Has olvidado la contraseña?</a>
        </div>

        <button type="submit" class="btn-primary">Iniciar Sesión</button>
      </form>

      <footer class="auth-footer">
        <p>¿No tienes una cuenta? <a routerLink="/register">Regístrate ahora</a></p>
      </footer>

    </div>
  </main>
</div>

<app-footer></app-footer>
