<main class="login-container">
  <h1>BidCo Workers</h1>
  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    
    <!-- Error de login -->
    <div *ngIf="loginError" class="error-summary">{{ loginError }}</div>
    
    <form class="login-form" (ngSubmit)="login()" #loginForm="ngForm">
      <label for="email">Correo o Nombre de usuario</label>
      <input type="text" id="email" name="email" required [(ngModel)]="email" />

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required [(ngModel)]="password" />

      <div class="options">
        <div class="remember-me">
          <input type="checkbox" id="remember" name="remember" [(ngModel)]="remember" />
          <label for="remember">Recordarme</label>
        </div>
      </div>

      <button type="submit">Iniciar Sesión</button>
    </form>
  </div>
</main>
<app-footer></app-footer>
