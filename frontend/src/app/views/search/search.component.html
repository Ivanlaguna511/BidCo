<app-header/>
<div>
  <div>
    <app-filter (filterChanged)="handleFilterApplied($event)"></app-filter>
  </div>
  <div id="subastas">
    <div id="top-items">
      <h1>Resultados De La Busqueda</h1>
      @if (isLoggedIn && !isExpert) {
        <div>
          <h2>Saldo: {{ saldoUser }}€</h2>
          <a id="crear-subasta" routerLink="/create-auction">Crear Subasta</a>
        </div>
      }
    </div>
    @if (!cargaDeProductos && products.length > 0) {
      <div id="items">
        @for (product of products; track product) {
          <div id="item">
            <a [routerLink]="['/search/product', product.subastaID]">
              <app-product-item [product]="product"></app-product-item>
            </a>
          </div>
        }
      </div>
    }
    @if (!cargaDeProductos && noCoincidencias) {
      <div id="noItems">
        <h3>No se han encontrado las subastas pedidas</h3>
      </div>
    }
  </div>
</div>
<app-footer/>
