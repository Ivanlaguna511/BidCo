<section class="form-container">
  <h3 class="form-title">Registrar Experto</h3>
  <form class="form" #form="ngForm" (ngSubmit)="submit(form)">
    <div class="form-group">
      <label for="exp-user">Usuario</label>
      <input id="exp-user"
        type="text"
        [(ngModel)]="expert.nombreUsuario"
        name="nombreUsuario"
        required />
      </div>
      <div class="form-group">
        <label for="exp-email">Correo Electrónico</label>
        <input id="exp-email"
          type="email"
          [(ngModel)]="expert.correoElectronico"
          name="correoElectronico"
          required />
        </div>
        <div class="form-group">
          <label for="exp-pass">Contraseña</label>
          <input id="exp-pass"
            type="password"
            [(ngModel)]="expert.contrasena"
            name="contraseña"
            required />
          </div>
          @if (message) {
            <div class="success-message">{{ message }}</div>
          }
          @if (formularioInvalido) {
            <div class="error-box">
              Los datos introducidos no son válidos.
            </div>
          }
          <button class="btn-primary" type="submit">Registrar</button>
        </form>
      </section>
