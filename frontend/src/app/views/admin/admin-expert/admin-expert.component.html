<section class="form-container">
  <h3 class="form-title">Registrar Experto</h3>
  <form class="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label for="exp-user">Usuario</label>
      <input id="exp-user"
             type="text"
             [(ngModel)]="expert.nombreUsuario"
             name="nombreUsuario"
             required />
    </div>
    <div class="form-group">
      <label for="exp-email">Correo Electrónico</label>
      <input id="exp-email"
             type="email"
             [(ngModel)]="expert.correoElectronico"
             name="correoElectronico"
             required />
    </div>
    <div class="form-group">
      <label for="exp-pass">Contraseña</label>
      <input id="exp-pass"
             type="password"
             [(ngModel)]="expert.contrasena"
             name="contraseña"
             required />
    </div>
    <div *ngIf="message" class="success-message">{{ message }}</div>
    <button class="btn-primary" type="submit">Registrar</button>
  </form>
</section>
