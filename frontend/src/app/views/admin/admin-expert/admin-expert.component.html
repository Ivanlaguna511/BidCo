<section class="admin-form-card">
  <div class="card-header">
    <h3 class="form-title">Alta de Nuevo Experto</h3>
    <p>Crea credenciales de acceso para un nuevo tasador.</p>
  </div>

  <form class="form-body" #form="ngForm" (ngSubmit)="submit(form)">
    <div class="input-group">
      <label for="exp-user">Nombre de Usuario</label>
      <input id="exp-user" type="text" [(ngModel)]="expert.nombreUsuario" name="nombreUsuario" required />
    </div>
    
    <div class="input-group">
      <label for="exp-email">Correo Electrónico</label>
      <input id="exp-email" type="email" [(ngModel)]="expert.correoElectronico" name="correoElectronico" required />
    </div>
    
    <div class="input-group">
      <label for="exp-pass">Contraseña Temporal</label>
      <input id="exp-pass" type="password" [(ngModel)]="expert.contrasena" name="contraseña" required />
    </div>
    
    @if (message) { <div class="alert-success">{{ message }}</div> }
    @if (formularioInvalido) { <div class="alert-error">Faltan datos o son inválidos. Revisa el formulario.</div> }
    
    <button class="btn-admin" type="submit">Registrar Experto</button>
  </form>
</section>
