<main class="auth-page-background">
  <div class="auth-container">
    <div class="auth-card admin-card">
      <header class="auth-header">
        <h1 class="brand-title">BidCo <span class="badge-admin">Admin</span></h1>
        <h2>Acceso Restringido</h2>
        <p>Portal de gestión y administración de la plataforma.</p>
      </header>

      @if (error) {
        <div class="alert-error">
          <span>{{ error }}</span>
        </div>
      }

      <form class="auth-form" (ngSubmit)="login()">
        <div class="input-group">
          <label for="username">Usuario Administrador</label>
          <input id="username" type="text" [(ngModel)]="username" name="username" required autocomplete="username" placeholder="admin_user" />
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" [(ngModel)]="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>

        <button class="btn-admin" type="submit">Entrar al Sistema</button>
      </form>
    </div>
  </div>
</main>
