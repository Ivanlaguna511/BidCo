<app-header></app-header>

<div class="page-layout">
  <app-filter (filterChanged)="handleFilterApplied($event)"></app-filter>

  <main class="main-content">
    
    <header class="content-header">
      <div class="header-titles">
        <h1>Subastas Actuales</h1>
      </div>

      @if (isLoggedIn && !isExpert) {
        <div class="user-actions">
          <div class="balance-badge">
            <span class="balance-label">Tu Saldo Disponible</span>
            <span class="balance-value">{{ saldoUser }}€</span>
          </div>
          <a class="btn-primary" routerLink="/create-auction">+ Crear Subasta</a>
        </div>
      }
    </header>

    <section class="products-grid">
      @for (product of products; track product.subastaID) {
        <article class="product-wrapper">
          <a [routerLink]="['/auction/product', product.subastaID]" class="product-link">
            <app-product-item [product]="product"></app-product-item>
          </a>
        </article>
      }
    </section>

  </main>
</div>

<app-footer></app-footer>
