<app-header></app-header>

<div class="auth-page-background">
  <main class="auth-container">
    
    <div class="auth-card">
      <header class="auth-header">
        <h1 class="brand-title">BidCo</h1>
        <h2>Recuperar Contraseña</h2>
        <p>Introduce tu correo electrónico y te enviaremos las instrucciones para restablecer tu acceso.</p>
      </header>

      @if (enviado) {
        <div class="alert-success">
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor"><path d="M424-320 256-488l56-56 112 112 280-280 56 56-336 336Z"/></svg>
          <span>Si el correo existe, recibirás un enlace en breve.</span>
        </div>
      }

      @if (!enviado) {
        <form class="auth-form" (ngSubmit)="recoverPassword()" #recoverForm="ngForm">
          <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="usuario@correo.com"
              required 
              [(ngModel)]="email" 
            />
          </div>

          <button type="submit" class="btn-primary" [disabled]="!email">Enviar Instrucciones</button>
        </form>
      }

      <footer class="auth-footer">
        <p><a routerLink="/login" class="back-link">← Volver a Iniciar Sesión</a></p>
      </footer>

    </div>
  </main>
</div>

<app-footer></app-footer>
