<div id="producto">
    <div><img [src]="product.imagen" alt="{{ product.nombreArticulo }}" /></div>
    <div id="detalles">
        <div><h1>{{ product.nombreArticulo }}</h1></div>
        <div>{{ isBlindAuction ? 'Precio Base: ' + product.precioInicial + '€' : isRaffle ? 'Puntos Para Participar: ' + product.puntosNecesarios : 'Precio Actual: ' + product.precioFinal + '€' }}</div>
        <div>Termina en: {{ countdown }}</div>
    </div>
</div>
