<article class="product-card">
  <div class="image-container">
    
    @if (isBlindAuction) {
      <span class="badge badge-blind">Subasta Ciega</span>
    } @else if (isRaffle) {
      <span class="badge badge-raffle">Sorteo</span>
    }
    
    <img class="product-img" [src]="product.imagen" [alt]="product.nombreArticulo" />
  </div>

  <div class="card-content">
    <h2 class="product-title" [title]="product.nombreArticulo">
      {{ product.nombreArticulo }}
    </h2>
    
    <div class="product-price">
      @if (isBlindAuction) {
        <span class="price-label">Precio Base</span>
        <span class="price-value">{{ product.precioInicial }}€</span>
      } @else if (isRaffle) {
        <span class="price-label">Ticket</span>
        <span class="price-value">{{ product.puntosNecesarios }} <small>pts</small></span>
      } @else {
        <span class="price-label">Puja Actual</span>
        <span class="price-value">{{ product.precioFinal }}€</span>
      }
    </div>

    <div class="product-countdown">
      <svg xmlns="http://www.w3.org/2000/svg" height="16" viewBox="0 -960 960 960" width="16" fill="currentColor"><path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm-40-160h80v-146l106-106-56-56-130 130v178Zm40-160Z"/></svg>
      <span>{{ countdown }}</span>
    </div>
  </div>
</article>
