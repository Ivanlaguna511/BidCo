<article class="expert-comment-card">
  <header class="comment-header">
    <div class="expert-info">
      <div class="avatar">
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor"><path d="M234-276q51-39 114-61.5T480-360q69 0 132 22.5T726-276q35-41 54.5-93T800-480q0-133-93.5-226.5T480-800q-133 0-226.5 93.5T160-480q0 59 19.5 111t54.5 93Zm246-164q-59 0-99.5-40.5T340-580q0-59 40.5-99.5T480-720q59 0 99.5 40.5T620-580q0 59-40.5 99.5T480-440Zm0 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q53 0 100-15.5t86-44.5q-39-29-86-44.5T480-280q-53 0-100 15.5T294-220q39 29 86 44.5T480-160Z"/></svg>
      </div>
      @if (expert) {
        <span class="expert-name">{{ expert.nombreUsuario }}</span>
      }
      <span class="expert-badge">
        <svg xmlns="http://www.w3.org/2000/svg" height="14" viewBox="0 -960 960 960" width="14" fill="currentColor"><path d="m344-60-76-128-144-32 14-148-98-112 98-112-14-148 144-32 76-128 136 58 136-58 76 128 144 32-14 148 98 112-98 112 14 148-144 32-76 128-136-58-136 58Zm34-102 102-44 104 44 56-96 110-26-10-112 74-84-74-86 10-112-110-24-58-96-102 44-104-44-56 96-110 24 10 112-74 86 74 84-10 114 110 24 58 96Zm102-318Zm-42 142 226-226-42-42-184 184-86-86-42 42 128 128Z"/></svg>
        Experto
      </span>
    </div>

    @if (isExpert && expertLogged.trabajadorID === comment.trabajadorID) {
      <button class="btn-edit" (click)="onEdit()" aria-label="Editar comentario">
        <svg xmlns="http://www.w3.org/2000/svg" height="16" viewBox="0 -960 960 960" width="16" fill="currentColor"><path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-528q12-12 28-12t28 12l51 51q12 12 12 28t-12 28L257-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/></svg>
        Editar
      </button>
    }
  </header>
  
  <div class="comment-body">
    <p>{{ comment.comentario }}</p>
  </div>
  
  <footer class="comment-footer">
    <div class="estimation-badge">
      <span class="estimation-label">Valor estimado del experto</span>
      <span class="estimation-value">{{ comment.precioEstimado }}€</span>
    </div>
  </footer>
</article>
