<!-- expert-comments.component.html -->
<div>
  @if (expert) {
    <p><strong>{{ expert.nombreUsuario }} (Experto) </strong></p>
  }
  <p>{{ comment.comentario }}</p>
  <p><em>Valor estimado: {{ comment.precioEstimado }}€</em></p>
  @if (isExpert && expertLogged.trabajadorID === comment.trabajadorID) {
    <button
      (click)="onEdit()"
      >
      Editar
    </button>
  }
</div>
