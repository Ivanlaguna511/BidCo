<!-- expert-comments.component.html -->
<div>
    <p><strong>Experto {{ comment.trabajadorID }}</strong></p>
    <p>{{ comment.comentario }}</p>
    <p><em>Valor estimado: {{ comment.precioEstimado }}€</em></p>
    <button 
      (click)="onEdit()" 
      *ngIf="isExpert && expert.trabajadorID === comment.trabajadorID">
      Editar
    </button>
  </div>
