version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      angular-core:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
      resto-frontend:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3