name: CI Validation Pipeline

# Se ejecuta cada vez que alguien o algo (Dependabot) hace un Pull Request
on:
  pull_request:
    branches: [ "deploy", "main", "master" ]

jobs:
  build-frontend:
    name: Validate Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Strict Build Check
        # Esto detectará errores TS como el que tuviste en Vercel antes de fusionar
        run: npm run build

  build-backend:
    name: Validate Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build and Test Spring Boot
        # Compila el código y ejecuta los tests unitarios de Java
        run: mvn clean verify