<!-- create-auction.component.html -->
<app-header></app-header>
<main>
  <h2>Crear Subasta</h2>
  <form class="auction-form">
    <!-- Sección para subir imagen -->
    <div class="image-upload">
      <label for="imagen" class="image-label">Subir Imagen</label>
      <input type="file" id="imagen" name="imagen" accept="image/*">
    </div>
    
    <!-- Sección derecha con campos de formulario -->
    <div class="right-section">
      <!-- Nombre y precio base en la misma fila -->
      <div class="product-info">
        <div class="form-group">
          <label for="titulo">Nombre del producto:</label>
          <input type="text" id="titulo" name="titulo" required>
        </div>
        <div class="form-group">
          <label for="precio_inicial">Precio Base (€):</label>
          <input type="number" id="precio_inicial" name="precio_inicial" min="0" required>
        </div>
      </div>

      <!-- Descripción -->
      <div class="description-section">
        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" name="descripcion" rows="4" required></textarea>
      </div>

      <!-- Tipo de subasta (normal o ciega) -->
      <div class="auction-type">
        <span>Tipo de Subasta</span>
        <div class="auction-type-options">
          <div>
            <input type="radio" id="subasta_normal" name="modalidad" value="normal" checked>
            <label for="subasta_normal">Subasta Normal</label>
          </div>
          <div>
            <input type="radio" id="subasta_ciegas" name="modalidad" value="ciega">
            <label for="subasta_ciegas">Subasta a Ciegas</label>
          </div>
        </div>
      </div>

      <!-- Duración -->
      <div class="duration-section">
        <label for="fecha_fin">Duración:</label>
        <input type="date" id="fecha_fin" name="fecha_fin" required>
      </div>
      
      <!-- Botón para crear la subasta -->
      <button type="submit" class="create-button">Crear la puja</button>
    </div>
  </form>
</main>

<app-footer/>
