<header>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
        rel="stylesheet"
    />

    <!-- Contenedor para el logo y el nombre -->
    <div class="header-brand">
        <!-- Logo clickeable -->
        <a routerLink="/auction" class="logo-link">
        <img src="Logo BidCo Recortado.jpg" alt="Logo BidCo" />
        </a>
        <!-- Nombre clickeable -->
        <a routerLink="/auction" class="name-link">
        <h1>BidCo</h1>
        </a>
    </div>

    <!-- DESPLEGABLE DE SECCIONES -->
    <div id="desplegable">
        <div class="dropdown" (click)="toggleDropdown($event)">
        <span class="dropbtn">
            <h1>Secciones ☰</h1>
        </span>
        <div class="dropdown-content" [class.show]="isDropdownOpen">
            <a routerLink="/auction">Subastas</a>
            <a routerLink="/blind-auctions">Subastas a Ciegas</a>
            <a routerLink="/raffle">Sorteos</a>
        </div>
        </div>
    </div>

    <!-- BARRA DE BÚSQUEDA -->
    <div id="search-bar">
        <input type="text" placeholder="Buscar en BidCo..." />
        <button type="submit">
        <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24"
            viewBox="0 96 960 960"
            width="24"
        >
            <path
            d="M796 936 536 676q-29 25-64.5 37.5T400 726q-100 0-170-70t-70-170q0-100 70-170t170-70q100 0 170 70t70 170q0 35-12.5 70.5T637 611l260 260-101 65ZM400 666q67 0 113.5-46.5T560 506q0-67-46.5-113.5T400 346q-67 0-113.5 46.5T240 506q0 67 46.5 113.5T400 666Z"
            />
        </svg>
        </button>
    </div>

    <!-- DESPLEGABLE PARA ELEGIR UNO DE LOS 3 ESCENARIOS -->
    <div id="desplegable">
        <div class="dropdown" (click)="toggleDropdownExamples($event)">
        <span class="dropbtn">
            <h1>Escenarios ☰</h1>
        </span>
        <div class="dropdown-content" [class.show]="isExamplesDropdownOpen">
            <div (click)="logout()">Usuario sin Sesión Iniciada</div>
            <div (click)="loginUser()">Usuario con Sesión Iniciada</div>
            <div (click)="loginExpert()">Vista de experto</div>
        </div>
        </div>
    </div>

    <!-- SI NO ESTÁ LOGUEADO: Botón de Iniciar Sesión -->
    <div id="login-btn" *ngIf="!isLoggedIn">
        <a routerLink="/login" class="google-login-btn">Iniciar Sesión</a>
    </div>

    <!-- SI ESTÁ LOGUEADO Y NO ES EXPERTO: Menú de usuario con foto -->
    <div *ngIf="isLoggedIn && !isExpert" id="user-menu">
        <div class="user-dropdown" (click)="toggleUserMenu($event)">
        <span class="userbtn">
            <img
            class="profile-pic"
            src="default-avatar.png"
            alt="Foto de perfil"
            />
        </span>
        <div class="user-dropdown-content" [class.show]="isUserMenuOpen">
            <a routerLink="/my-bids">Mis Pujas</a>
            <a routerLink="/my-auctions">Mis Subastas</a>
            <a routerLink="/profile">Mi Perfil</a>
            <a (click)="logout()">Cerrar Sesión</a>
        </div>
        </div>
    </div>

    <!-- SI ESTÁ LOGUEADO Y ES EXPERTO: Menú de experto con foto -->
    <div *ngIf="isLoggedIn && isExpert" id="user-menu">
        <div class="user-dropdown" (click)="toggleUserMenu($event)">
        <span class="userbtn">
            <img
            class="profile-pic"
            src="expert-avatar.png"
            alt="Foto de perfil"
            />
        </span>
        <div class="user-dropdown-content" [class.show]="isUserMenuOpen">
            <a routerLink="/profile">Mi Perfil</a>
            <a (click)="logout()">Cerrar Sesión</a>
        </div>
        </div>
    </div>
</header>
