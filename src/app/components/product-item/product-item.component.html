<div id="producto">
    <div><img [src]="product.img" alt="{{ product.name }}"></div>
    <div id="detalles">
        <div><h1>{{ product.name }}</h1></div>
        <div>{{ isBlindAuction ? 'Precio Base: ' + product.base_price + '€' : isRaffle ? 'Puntos Para Participar: ' + product.actual_price : 'Precio Actual: ' + product.actual_price + '€' }}</div>
        <div>Termina en: {{ product.end_date }}</div>
    </div>
</div>
