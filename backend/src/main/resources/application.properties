spring.application.name=api-rest

# Configuración de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bidcodb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate (JPA)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (JSON Web Token) Configuration
jwt.secret=0wLqYh8jJkZ2tP7bA1mN6cV4xR9gUvW3eSrQyDfGhX5uJpMnBvCtFzHlIoK0iEaTd
jwt.expiration=86400000  # 24 horas en milisegundos


#Logs
logging.level.org.springframework=DEBUG
logging.level.com.bidco=DEBUG

#Tamaño maximo imagenes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
